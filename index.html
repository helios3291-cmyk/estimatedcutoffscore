<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>추정 분할점수 산출 도우미</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>
        추정 분할점수 산출 도우미
        <a href="https://helios3291-cmyk.github.io/exampoint/" class="header-companion-link" target="_blank" rel="noopener">고등학교 시험 배점 도우미</a>
      </h1>
      <p class="subtitle">정기시험·수행평가 분할점수와 반영 비율로 학기말 추정 분할점수를 산출합니다.</p>
      <div class="grade-mode-bar">
        <span class="grade-mode-label">성취도 체계</span>
        <label class="radio-label">
          <input type="radio" name="grade-mode" value="five" checked>
          5단계 (A~E)
        </label>
        <label class="radio-label">
          <input type="radio" name="grade-mode" value="six">
          5단계 + 미도달
        </label>
      </div>
    </header>

    <div id="app-readiness" class="readiness-bar" aria-live="polite"></div>

    <nav class="tab-nav" role="tablist">
      <button type="button" class="tab-btn active" data-tab="basic" role="tab">1. 기본</button>
      <button type="button" class="tab-btn" data-tab="exam-helper" role="tab">2. 정기시험별 추정분할점수 산출</button>
      <button type="button" class="tab-btn" data-tab="exam2-tuner" role="tab">3. 실제 학생 성적 기반 정기시험2 추정 준비</button>
      <button type="button" class="tab-btn" data-tab="student" role="tab">4. 학생 예측</button>
    </nav>

    <main>
      <div id="panel-basic" class="tab-panel active" role="tabpanel"></div>
      <div id="panel-exam-helper" class="tab-panel" role="tabpanel"></div>
      <div id="panel-exam2-tuner" class="tab-panel" role="tabpanel"></div>
      <div id="panel-student" class="tab-panel" role="tabpanel"></div>
    </main>

    <footer class="disclaimer">
      <p>본 도구는 교사의 추정을 돕는 참고용입니다. 실제 성적 산출 방식·학교 지침과 다를 수 있습니다.</p>
      <p>환산점 = 분할점수 × (반영 비율 ÷ 만점)<br>학기말 점수 = 정기1 환산점 + 정기2 환산점 + 수행 환산점 (정수 반올림)</p>
    </footer>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
